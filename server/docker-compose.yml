services:
  backend:
    build: .
    container_name: bytecart-server
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      MONGO_URI: mongodb://admin:password@mongodb:27017/bytecart
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: bytecart-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: